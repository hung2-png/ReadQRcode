<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KSSH 掃描簽到系統</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 20px; font-family: sans-serif; }
        #reader { width: 100%; max-width: 450px; margin: auto; border: 5px solid #34495e; border-radius: 10px; overflow: hidden; background: white; }
        #result-box { max-width: 450px; margin: 20px auto; padding: 15px; border-radius: 8px; text-align: center; font-weight: bold; }
        .status-idle { background: #e9ecef; color: #6c757d; }
        .status-loading { background: #fff3cd; color: #856404; }
        .status-success { background: #d4edda; color: #155724; border: 2px solid #28a745; }
        .status-error { background: #f8d7da; color: #721c24; border: 2px solid #dc3545; }
        .history { max-width: 450px; margin: auto; font-size: 0.85rem; background: white; border-radius: 8px; padding: 10px; height: 150px; overflow-y: auto; box-shadow: inset 0 0 5px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="container text-center">
        <h3 class="mb-3">📷 學生簽到掃描器</h3>
        <div id="reader"></div>
        
        <div id="result-box" class="status-idle">
            等待掃描中...
        </div>

        <div class="history text-start" id="history">
            <div class="text-muted text-center">簽到紀錄將顯示於此</div>
        </div>
        
        <p class="mt-4 text-muted" style="font-size: 0.8rem;">請確認已開啟攝影機權限</p>
    </div>

    <script>
        // ⚠️ 請替換成你部署後的 Google Web App URL
        const GAS_URL = "你的_GAS_網址"; 

        const html5QrCode = new Html5Qrcode("reader");
        const resultBox = document.getElementById('result-box');
        const historyBox = document.getElementById('history');
        let isProcessing = false;

        const config = { fps: 10, qrbox: { width: 250, height: 250 } };

        function onScanSuccess(decodedText) {
            if (isProcessing) return; // 防止重複掃描
            isProcessing = true;

            resultBox.className = "status-loading";
            resultBox.innerText = "⏳ 處理中，請稍候...";

            fetch(GAS_URL, {
                method: "POST",
                mode: "no-cors", // 配合 GAS 跨網域設定
                body: JSON.stringify({ qrText: decodedText })
            })
            .then(() => {
                // 由於 no-cors 無法讀取 response，我們預設只要發送成功就是收到
                resultBox.className = "status-success";
                resultBox.innerHTML = "✅ 掃描成功！<br><small>" + decodedText.split(',')[1] + " 同學</small>";
                
                const now = new Date().toLocaleTimeString();
                const log = document.createElement('div');
                log.innerHTML = `<b>[${now}]</b> 成功: ${decodedText.split(',')[1]}`;
                historyBox.prepend(log);

                // 2秒後恢復掃描
                setTimeout(() => {
                    isProcessing = false;
                    resultBox.className = "status-idle";
                    resultBox.innerText = "等待下一個掃描...";
                }, 2000);
            })
            .catch(err => {
                resultBox.className = "status-error";
                resultBox.innerText = "❌ 系統錯誤：" + err;
                isProcessing = false;
            });
        }

        html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess);
    </script>
</body>
</html>

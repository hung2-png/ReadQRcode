<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>學生 QR Code 簽到</title>
  <script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 16px;
      margin: 0;
      background: #f7f7f7;
    }

    h2 {
      margin: 12px 0;
      font-size: 2rem;
    }

    #cameraSelect {
      font-size: 16px;
      padding: 8px;
      margin: 10px 0 16px 0;
      max-width: 90%;
    }

    video {
      width: 95vw;
      max-width: 640px;
      border: 2px solid #333;
      border-radius: 12px;
      background: #000;
      margin-top: 12px;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

    #result {
      margin-top: 20px;
      font-size: 1.8em;
      font-weight: bold;
      min-height: 2em;
      padding: 8px;
    }

    .tip {
      color: #666;
      font-size: 14px;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <h2>📷 學生 QR Code 簽到</h2>

  <div>
    <label for="cameraSelect"><strong>選擇攝影機：</strong></label><br>
    <select id="cameraSelect"></select>
  </div>

  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas" style="display:none;"></canvas>

  <div id="result">等待掃描中...</div>
  <div class="tip">請以 Chrome 開啟，並允許使用攝影機</div>

  <script>
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz-GNmNaPsjIpdbTMjsjce6t_gGAlJTZwWikTJjikTLxHJ-JnDaWzVew-UpH4-J_0BL/exec";

    let video = null;
    let canvas = null;
    let ctx = null;
    let stream = null;
    let scanning = false;
    let isSubmitting = false;
    let cameraSelect = null;

    function showMessage(msg, color = "black") {
      const resultDiv = document.getElementById("result");
      resultDiv.textContent = msg;
      resultDiv.style.color = color;
    }

    async function initCamera() {
      video = document.getElementById("video");
      canvas = document.getElementById("canvas");
      ctx = canvas.getContext("2d");
      cameraSelect = document.getElementById("cameraSelect");

      try {
        await navigator.mediaDevices.getUserMedia({ video: true });

        const devices = await navigator.mediaDevices.enumerateDevices();
        const videoDevices = devices.filter(d => d.kind === "videoinput");

        cameraSelect.innerHTML = "";

        videoDevices.forEach((device, i) => {
          const option = document.createElement("option");
          option.value = device.deviceId;
          option.text = device.label || `Camera ${i + 1}`;
          cameraSelect.appendChild(option);
        });

        if (videoDevices.length > 0) {
          await startCamera(videoDevices[0].deviceId);
        } else {
          showMessage("⚠️ 找不到可用攝影機", "blue");
        }

      } catch (err) {
        console.error("initCamera error:", err);
        showMessage(`❌ 無法啟用攝影機：${err.name || ""} ${err.message || ""}`, "red");
      }
    }

    async function startCamera(deviceId) {
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
      }

      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: deviceId
            ? { deviceId: { exact: deviceId } }
            : { facingMode: "environment" }
        });

        video.srcObject = stream;
        scanning = true;
        scanLoop();

      } catch (err) {
        console.error("startCamera error:", err);
        showMessage(`❌ 攝影機錯誤：${err.name || ""} ${err.message || ""}`, "red");
      }
    }

    // ✅ 改用 JSONP 呼叫 GAS，避開跨網域限制
    function submitQRData(qrData) {
      return new Promise((resolve) => {
        const callbackName = "handleScanResult_" + Date.now() + "_" + Math.floor(Math.random() * 100000);

        const script = document.createElement("script");

        window[callbackName] = function(result) {
          try {
            resolve(result.message || "✅ 簽到成功");
          } finally {
            delete window[callbackName];
            script.remove();
          }
        };

        const url =
          GAS_WEB_APP_URL +
          "?mode=jsonp" +
          "&callback=" + encodeURIComponent(callbackName) +
          "&qrData=" + encodeURIComponent(qrData);

        script.src = url;

        script.onerror = function() {
          delete window[callbackName];
          script.remove();
          resolve("❌ 傳送失敗：無法連線到 GAS");
        };

        document.body.appendChild(script);
      });
    }

    function speak(text) {
      const utter = new SpeechSynthesisUtterance(text);
      utter.lang = "zh-TW";
      utter.rate = 1;
      speechSynthesis.speak(utter);
    }

    function vibrateOnce() {
      if (navigator.vibrate) {
        navigator.vibrate(200);
      }
    }

    function scanLoop() {
      if (!scanning || isSubmitting) return;

      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(imageData.data, imageData.width, imageData.height);

        if (code) {
          const qrData = (code.data || "").trim();

          if (!qrData) {
            requestAnimationFrame(scanLoop);
            return;
          }

          scanning = false;
          isSubmitting = true;

          showMessage(`✅ 掃到 QR Code：${qrData}`, "black");

          submitQRData(qrData).then(msg => {
            if (msg.includes("✅")) {
              showMessage(msg, "green");
              const parts = qrData.split(" ");
              if (parts.length >= 2) {
                speak(parts[1] + " 簽到成功");
              }
              vibrateOnce();

            } else if (msg.includes("⏱")) {
              showMessage(msg, "#FF6600");
              speak("重複簽到");

            } else if (msg.includes("⚠️")) {
              showMessage(msg, "blue");

              if (msg.includes("非本節課")) {
                speak("非本節 QR code");
              } else if (msg.includes("非今日課程")) {
                speak("非本日 QR code");
              }

            } else {
              showMessage(msg, "red");
            }

            setTimeout(() => {
              showMessage("等待掃描中...", "black");
              scanning = true;
              isSubmitting = false;
              scanLoop();
            }, 800);
          });

          return;
        }
      }

      requestAnimationFrame(scanLoop);
    }

    document.addEventListener("DOMContentLoaded", () => {
      initCamera();

      document.getElementById("cameraSelect").addEventListener("change", async () => {
        const selectedId = cameraSelect.value;
        await startCamera(selectedId);
      });
    });
  </script>
</body>
</html>

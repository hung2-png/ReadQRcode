<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KSSH 學生簽到掃描器</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; padding-top: 20px; font-family: "Microsoft JhengHei", sans-serif; }
        .main-container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        #reader { width: 100%; border-radius: 10px; overflow: hidden; border: none !important; }
        #result-box { margin-top: 20px; padding: 15px; border-radius: 8px; font-weight: bold; font-size: 1.1rem; transition: all 0.3s; }
        .status-idle { background: #e9ecef; color: #6c757d; }
        .status-loading { background: #fff3cd; color: #856404; border: 2px solid #ffc107; }
        .status-success { background: #d4edda; color: #155724; border: 2px solid #28a745; }
        .status-error { background: #f8d7da; color: #721c24; border: 2px solid #dc3545; }
        .history { margin-top: 20px; font-size: 0.9rem; background: #f8f9fa; border-radius: 8px; padding: 12px; height: 150px; overflow-y: auto; text-align: left; }
        button { border-radius: 8px !important; }
    </style>
</head>
<body>
    <div class="container main-container text-center">
        <h4 class="mb-3">📷 學生簽到掃描器</h4>
        
        <div id="reader"></div>
        
        <div id="result-box" class="status-idle">
            等待掃描中...
        </div>

        <div class="history" id="history">
            <div class="text-muted text-center">簽到成功紀錄將顯示於此</div>
        </div>
        
        <p class="mt-3 text-muted" style="font-size: 0.75rem;">建議：若無法對焦，請嘗試將鏡頭稍微拿遠</p>
    </div>

    <audio id="beepSound" src="https://www.soundjay.com/button/beep-07.mp3" preload="auto"></audio>

    <script>
        // 1. 填入您的 GAS URL
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwMgDGjFfyHiasp6EalwEm6o3aIuZKYxKDPYdtGAyngxkyscvysIQAHfFUfLPjgKVPeiQ/exec"; 

        const resultBox = document.getElementById('result-box');
        const historyBox = document.getElementById('history');
        const beep = document.getElementById('beepSound');
        let isProcessing = false;

        // 2. 初始化掃描器 (使用帶有 UI 的 Scanner 版本，相容性更高)
        function onScanSuccess(decodedText) {
            if (isProcessing) return;
            isProcessing = true;

            // 播放音效
            try { beep.play(); } catch(e) {}

            resultBox.className = "status-loading";
            resultBox.innerText = "⏳ 讀取成功，處理中...";

            // 傳送資料到 GAS
            fetch(GAS_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ qrText: decodedText })
            })
            .then(() => {
                const parts = decodedText.split(',');
                const studentName = parts[1] || "未知學生";
                
                resultBox.className = "status-success";
                resultBox.innerHTML = `✅ 簽到成功<br>${studentName}`;

                // 寫入紀錄
                const now = new Date().toLocaleTimeString();
                const log = document.createElement('div');
                log.style.borderBottom = "1px solid #eee";
                log.style.padding = "4px 0";
                log.innerHTML = `<span class="text-primary">[${now}]</span> <b>${studentName}</b> - 已上傳`;
                
                if (historyBox.firstChild && historyBox.firstChild.className === "text-muted text-center") {
                    historyBox.innerHTML = ""; 
                }
                historyBox.prepend(log);

                // 2.5秒後恢復掃描
                setTimeout(() => {
                    isProcessing = false;
                    resultBox.className = "status-idle";
                    resultBox.innerText = "等待下一個 QR Code...";
                }, 2500);
            })
            .catch(err => {
                resultBox.className = "status-error";
                resultBox.innerText = "❌ 傳輸錯誤: " + err;
                isProcessing = false;
            });
        }

        // 3. 啟動掃描器
        // 這裡設定鏡頭每秒讀取 15 次，框框設為 250 像素
        const html5QrcodeScanner = new Html5QrcodeScanner(
            "reader", 
            { 
                fps: 15, 
                qrbox: { width: 250, height: 250 },
                aspectRatio: 1.0,
                showTorchButtonIfSupported: true // 如果支援，顯示手電筒按鈕
            }
        );
        
        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>

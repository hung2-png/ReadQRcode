<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>學生 QR Code 簽到</title>
  <script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; padding: 16px; margin: 0; background: #f7f7f7; }
    h2 { margin: 12px 0; font-size: 2rem; }
    #cameraSelect { font-size: 16px; padding: 8px; margin: 10px 0 16px 0; max-width: 90%; }
    video { width: 95vw; max-width: 640px; border: 2px solid #333; border-radius: 12px; background: #000; display: block; margin: 12px auto; }
    #result { margin-top: 20px; font-size: 1.8em; font-weight: bold; min-height: 2em; padding: 8px; border-radius: 8px; }
    .status-wait { color: black; }
    .status-success { color: green; background: #d4edda; }
    .tip { color: #666; font-size: 14px; margin-top: 16px; }
  </style>
</head>
<body>
  <h2>📷 學生 QR Code 簽到</h2>

  <div>
    <label for="cameraSelect"><strong>選擇攝影機：</strong></label><br>
    <select id="cameraSelect"></select>
  </div>

  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas" style="display:none;"></canvas>

  <div id="result" class="status-wait">等待掃描中...</div>
  <div class="tip">請以 Chrome 開啟，並允許使用攝影機</div>

  <script>
    // 1. 確保 URL 是您的正式 GAS 網址
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwMgDGjFfyHiasp6EalwEm6o3aIuZKYxKDPYdtGAyngxkyscvysIQAHfFUfLPjgKVPeiQ/exec";

    let video = null;
    let canvas = null;
    let ctx = null;
    let stream = null;
    let scanning = false;
    let isSubmitting = false;

    function showMessage(msg, type = "wait") {
      const resultDiv = document.getElementById("result");
      resultDiv.textContent = msg;
      resultDiv.className = type === "success" ? "status-success" : "status-wait";
    }

    async function initCamera() {
      video = document.getElementById("video");
      canvas = document.getElementById("canvas");
      ctx = canvas.getContext("2d");
      const cameraSelect = document.getElementById("cameraSelect");

      try {
        await navigator.mediaDevices.getUserMedia({ video: true });
        const devices = await navigator.mediaDevices.enumerateDevices();
        const videoDevices = devices.filter(d => d.kind === "videoinput");

        cameraSelect.innerHTML = "";
        videoDevices.forEach((device, i) => {
          const option = document.createElement("option");
          option.value = device.deviceId;
          option.text = device.label || `Camera ${i + 1}`;
          cameraSelect.appendChild(option);
        });

        if (videoDevices.length > 0) {
          // 預設開啟最後一個鏡頭 (通常是後鏡頭)
          await startCamera(videoDevices[videoDevices.length - 1].deviceId);
        }
      } catch (err) {
        showMessage("❌ 無法啟用攝影機", "wait");
      }
    }

    async function startCamera(deviceId) {
      if (stream) { stream.getTracks().forEach(track => track.stop()); }
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { deviceId: { exact: deviceId } }
        });
        video.srcObject = stream;
        scanning = true;
        scanLoop();
      } catch (err) {
        showMessage("❌ 攝影機錯誤", "wait");
      }
    }

    // ✅ 修改後的提交函式：對接「兩欄式」GAS
    async function submitQRData(qrData) {
      try {
        await fetch(GAS_WEB_APP_URL, {
          method: "POST",
          mode: "no-cors",
          body: JSON.stringify({ qrText: qrData })
        });
        return "✅ 簽到成功";
      } catch (e) {
        return "❌ 傳送失敗";
      }
    }

    function speak(text) {
      const utter = new SpeechSynthesisUtterance(text);
      utter.lang = "zh-TW";
      speechSynthesis.speak(utter);
    }

    function scanLoop() {
      if (!scanning || isSubmitting) return;

      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(imageData.data, imageData.width, imageData.height);

        if (code && code.data.trim()) {
          const qrData = code.data.trim();
          scanning = false;
          isSubmitting = true;

          // 抓取姓名 (QR內容：學號,姓名,日期...)
          const parts = qrData.split(',');
          const studentName = parts[1] || "同學";

          showMessage(`⏳ 處理中：${studentName}`, "wait");

          submitQRData(qrData).then(msg => {
            if (msg.includes("✅")) {
              showMessage(`✅ ${studentName} 簽到成功`, "success");
              speak(studentName + " 簽到成功");
              if (navigator.vibrate) navigator.vibrate(200);
            } else {
              showMessage(msg, "wait");
            }

            // 1.2 秒後恢復掃描
            setTimeout(() => {
              showMessage("等待掃描中...", "wait");
              scanning = true;
              isSubmitting = false;
              scanLoop();
            }, 1200);
          });
          return;
        }
      }
      requestAnimationFrame(scanLoop);
    }

    document.addEventListener("DOMContentLoaded", () => {
      initCamera();
      document.getElementById("cameraSelect").addEventListener("change", (e) => {
        startCamera(e.target.value);
      });
    });
  </script>
</body>
</html>

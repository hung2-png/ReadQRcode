<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>學生 QR Code 簽到系統</title>
  <script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; padding: 16px; margin: 0; background: #f7f7f7; }
    h2 { margin: 12px 0; font-size: 1.8rem; color: #333; }
    .controls { margin-bottom: 15px; }
    #cameraSelect { font-size: 16px; padding: 10px; width: 90%; max-width: 400px; border-radius: 8px; border: 1px solid #ccc; }
    #video-container { position: relative; width: 95vw; max-width: 640px; margin: 0 auto; }
    video { width: 100%; border: 3px solid #444; border-radius: 12px; background: #000; }
    #result { margin-top: 15px; font-size: 2em; font-weight: bold; min-height: 2.2em; padding: 15px; border-radius: 12px; transition: 0.3s; }
    .status-wait { color: #666; background: #eee; }
    .status-ok { color: #fff; background: #28a745; border: none; }
    .tip { color: #888; font-size: 14px; margin-top: 15px; }
  </style>
</head>
<body>
  <h2>📷 學生掃描簽到</h2>

  <div class="controls">
    <select id="cameraSelect">正在偵測攝影機...</select>
  </div>

  <div id="video-container">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas" style="display:none;"></canvas>
  </div>

  <div id="result" class="status-wait">等待掃描中...</div>
  <div class="tip">筆電/平板建議：環境光線充足可提高辨識率</div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwMgDGjFfyHiasp6EalwEm6o3aIuZKYxKDPYdtGAyngxkyscvysIQAHfFUfLPjgKVPeiQ/exec";

    let video, canvas, ctx, stream;
    let scanning = false;
    let isSubmitting = false;

    function showStatus(msg, isSuccess = false) {
      const res = document.getElementById("result");
      res.textContent = msg;
      res.className = isSuccess ? "status-ok" : "status-wait";
    }

    async function initCamera() {
      video = document.getElementById("video");
      canvas = document.getElementById("canvas");
      ctx = canvas.getContext("2d");
      const cameraSelect = document.getElementById("cameraSelect");

      try {
        await navigator.mediaDevices.getUserMedia({ video: true });
        const devices = await navigator.mediaDevices.enumerateDevices();
        const videoDevices = devices.filter(d => d.kind === "videoinput");

        cameraSelect.innerHTML = "";
        videoDevices.forEach((device, i) => {
          const option = document.createElement("option");
          option.value = device.deviceId;
          option.text = device.label || `攝影機 ${i + 1}`;
          cameraSelect.appendChild(option);
        });

        // 預設啟動：如果是平板通常最後一個是後鏡頭；筆電則是第一個
        const defaultId = videoDevices.length > 1 ? videoDevices[videoDevices.length - 1].deviceId : videoDevices[0].deviceId;
        startCamera(defaultId);
      } catch (err) {
        showStatus("❌ 無法啟動攝影機");
      }
    }

    async function startCamera(deviceId) {
      if (stream) stream.getTracks().forEach(t => t.stop());
      stream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: { exact: deviceId } } });
      video.srcObject = stream;
      scanning = true;
      requestAnimationFrame(scanLoop);
    }

    function scanLoop() {
      if (!scanning || isSubmitting) return;
      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(imgData.data, imgData.width, imgData.height);

        if (code && code.data.trim()) {
          const qrData = code.data.trim();
          isSubmitting = true;
          const studentName = qrData.split(',')[1] || "同學";

          showStatus("⏳ 傳送中...");
          
          fetch(GAS_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ qrText: qrData }) })
            .then(() => {
              showStatus(`✅ ${studentName} 簽到成功`, true);
              if ('speechSynthesis' in window) {
                const utter = new SpeechSynthesisUtterance(studentName + "簽到成功");
                utter.lang = "zh-TW";
                speechSynthesis.speak(utter);
              }
              
              setTimeout(() => {
                isSubmitting = false;
                showStatus("等待掃描中...");
                requestAnimationFrame(scanLoop);
              }, 1200);
            });
          return;
        }
      }
      requestAnimationFrame(scanLoop);
    }

    document.addEventListener("DOMContentLoaded", initCamera);
    document.getElementById("cameraSelect").onchange = (e) => startCamera(e.target.value);
  </script>
</body>
</html>

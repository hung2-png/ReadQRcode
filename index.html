<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KSSH 學生簽到掃描器</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; padding-top: 20px; font-family: "Microsoft JhengHei", sans-serif; }
        .main-container { max-width: 480px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        #reader { width: 100%; border-radius: 12px; overflow: hidden; border: none !important; background: #000; }
        #result-box { margin-top: 20px; padding: 15px; border-radius: 12px; font-weight: bold; font-size: 1.2rem; transition: all 0.2s ease; }
        .status-idle { background: #f8f9fa; color: #adb5bd; border: 1px solid #dee2e6; }
        .status-loading { background: #fff3cd; color: #856404; border: 2px solid #ffc107; transform: scale(1.02); }
        .status-success { background: #d4edda; color: #155724; border: 2px solid #28a745; transform: scale(1.05); }
        .history { margin-top: 20px; font-size: 0.85rem; background: #ffffff; border: 1px solid #eee; border-radius: 10px; padding: 10px; height: 130px; overflow-y: auto; }
        .history-item { padding: 5px 0; border-bottom: 1px solid #f1f1f1; display: flex; justify-content: space-between; }
        .time-tag { color: #999; font-size: 0.75rem; }
        /* 隱藏庫內建的冗餘按鈕文字 */
        #reader button { padding: 8px 16px; border-radius: 8px; border: none; background: #0d6efd; color: white; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container main-container text-center">
        <h4 class="mb-4">📷 KSSH 簽到掃描器</h4>
        
        <div id="reader"></div>
        
        <div id="result-box" class="status-idle">
            等待掃描...
        </div>

        <div class="history" id="history">
            <div class="text-muted text-center" style="margin-top:40px;">尚未有簽到紀錄</div>
        </div>
        
        <p class="mt-4 text-muted" style="font-size: 0.7rem;">提示：若對焦困難，請調整距離或擦拭鏡頭</p>
    </div>

    <audio id="beepSound" src="https://www.soundjay.com/button/beep-07.mp3" preload="auto"></audio>

    <script>
        // 1. 您的 GAS URL (請確認與 Code.gs 部署網址一致)
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwMgDGjFfyHiasp6EalwEm6o3aIuZKYxKDPYdtGAyngxkyscvysIQAHfFUfLPjgKVPeiQ/exec"; 

        const resultBox = document.getElementById('result-box');
        const historyBox = document.getElementById('history');
        const beep = document.getElementById('beepSound');
        let isProcessing = false;

        // 2. 掃描成功處理
        function onScanSuccess(decodedText) {
            if (isProcessing) return; // 避免連發
            isProcessing = true;

            // 立即回饋：播放嗶聲與顯示處理中
            try { beep.play(); } catch(e) { console.log("音效播放失敗"); }
            
            const dataParts = decodedText.split(',');
            const studentName = dataParts[1] || "未知學生";

            resultBox.className = "status-loading";
            resultBox.innerText = "⏳ 上傳中：" + studentName;

            // 非同步發送到 GAS
            fetch(GAS_URL, {
                method: "POST",
                mode: "no-cors",
                cache: "no-cache",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ qrText: decodedText })
            })
            .then(() => {
                // 更新介面為成功狀態
                resultBox.className = "status-success";
                resultBox.innerHTML = `✅ 簽到成功<br><span style="font-size:0.9rem">${studentName}</span>`;

                // 增加到歷史紀錄
                updateHistory(studentName);

                // 1.2 秒後恢復，讓老師可以快速掃下一個
                setTimeout(() => {
                    isProcessing = false;
                    resultBox.className = "status-idle";
                    resultBox.innerText = "等待掃描...";
                }, 1200);
            })
            .catch(err => {
                alert("網路連線異常，請重試");
                isProcessing = false;
            });
        }

        function updateHistory(name) {
            if (historyBox.innerText.includes("尚未有簽到紀錄")) historyBox.innerHTML = "";
            const now = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
            const item = document.createElement('div');
            item.className = "history-item";
            item.innerHTML = `<span>👤 ${name}</span><span class="time-tag">${now}</span>`;
            historyBox.prepend(item);
        }

        // 3. 啟動掃描器設定
        const html5QrcodeScanner = new Html5QrcodeScanner(
            "reader", 
            { 
                fps: 20,           // 提高偵測率
                qrbox: { width: 250, height: 250 },
                aspectRatio: 1.0,
                rememberLastUsedCamera: true
            }
        );
        
        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>
